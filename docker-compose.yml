services:
  mysql:
    build: .
    container_name: learning-sql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sakila-db:/docker-entrypoint-initdb.d
      - ./.my.cnf:/root/.my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 30

  adminer:
    image: adminer
    container_name: learning-sql-adminer
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./adminer/index.php:/var/www/html/index.php:ro
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
